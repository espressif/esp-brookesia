version: "0.7.6"
description: ESP-Brookesia WiFi service which provides state machine management, AP scanning, connection management, and SoftAP functionality.
url: https://github.com/espressif/esp-brookesia/tree/master/service/brookesia_service_wifi
repository: https://github.com/espressif/esp-brookesia.git
issues: https://github.com/espressif/esp-brookesia/issues
dependencies:
  # Remote WiFi support for ESP32-P4
  espressif/esp_wifi_remote:
    version: ">=0.10,<2.0"
    rules:
      - if: "target in [esp32p4, esp32h2]"
  # TODO: workaround for the compatibility issue of the `v2.12.5` version
  espressif/esp_hosted:
    version: "2.12.3"
    rules:
      - if: "target in [esp32p4, esp32h2]"

  espressif/brookesia_service_helper:
    version: "0.7.*"
    override_path: "../brookesia_service_helper"
    require: public

examples:
  - path: ../../examples/agent/chatbot
  - path: ../../examples/service/console
  - path: ../../examples/service/wifi

version: "0.8.0"
description: ESP-Brookesia Expression Emote which provides expression emote management, including emoji set, animation set, and event message set.
url: https://github.com/espressif/esp-boost
repository: https://github.com/espressif/esp-boost.git
issues: https://github.com/espressif/esp-boost/issues

dependencies:
  espressif2022/esp_emote_expression:
    version: '1.0.*'
    require: private

  espressif/brookesia_service_helper:
    version: "0.8.*"
    override_path: ../../framework/brookesia_service_helper
    require: public

  espressif/brookesia_service_display:
    version: "0.8.*"
    override_path: ../../media/brookesia_service_display
    require: private

  espressif/brookesia_hal_interface:
    version: "0.8.*"
    override_path: ../../../hal/brookesia_hal_interface
    require: private

examples:
  - path: ../../../examples/service/console
  - path: ../../../examples/agent/chatbot

version: "0.8.1"
description: ESP-Brookesia OpenAI Agent which provides OpenAI API integration, peer-to-peer communication, and agent management.
url: https://github.com/espressif/esp-brookesia/tree/master/service/agent/brookesia_agent_openai
repository: https://github.com/espressif/esp-brookesia.git
issues: https://github.com/espressif/esp-brookesia/issues
dependencies:
  espressif/esp_peer:
    version: "^1.2.2"
    require: private

  espressif/cjson:
    version: "^1.7.19"
    require: private
    rules:
      - if: "idf_version >=6.0"

  espressif/brookesia_agent_manager:
    version: "0.8.*"
    override_path: ../brookesia_agent_manager
    require: public

examples:
  - path: ../../../examples/agent/chatbot

version: "0.8.1"
description: ESP-Brookesia video service for local capture encoding (H.264, MJPEG, RGB/YUV) and compressed-stream decoding to pixel formats.
url: https://github.com/espressif/esp-brookesia/tree/master/service/media/brookesia_service_video
repository: https://github.com/espressif/esp-brookesia.git
issues: https://github.com/espressif/esp-brookesia/issues
dependencies:
  espressif/brookesia_service_helper:
    version: "0.8.*"
    override_path: ../../framework/brookesia_service_helper
    require: public
  espressif/brookesia_service_display:
    version: "0.8.*"
    override_path: ../brookesia_service_display
    require: public

examples:
  - path: ../../../examples/service/console

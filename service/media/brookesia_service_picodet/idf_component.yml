version: "0.8.0"
description: ESP-Brookesia PicoDet service for on-device object detection using esp-dl ESPDet-Pico models loaded from the filesystem.
url: https://github.com/espressif/esp-brookesia/tree/master/service/media/brookesia_service_picodet
repository: https://github.com/espressif/esp-brookesia.git
issues: https://github.com/espressif/esp-brookesia/issues
dependencies:
  espressif/brookesia_service_helper:
    version: "0.8.*"
    override_path: ../../framework/brookesia_service_helper
    require: public
  espressif/brookesia_service_display:
    version: "0.8.*"
    override_path: ../brookesia_service_display
    require: private
  espressif/esp-dl:
    version: "3.3.6"
    require: private

# Peripherals Configuration
peripherals:
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 15
        scl: 14

  # I2S configuration for full-duplex audio with ES8311
  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config: &i2s_config
      port: 0
      sample_rate_hz: 48000
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_STEREO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16
      pins:
        mclk: 42
        bclk: 9
        ws: 45
        dout: 8
        din: 10

    # I2S configuration for full-duplex audio with ES8311
  - name: i2s_audio_in
    type: i2s
    format: std-in
    role: master
    config: *i2s_config

  # PA CONTROL
  - name: gpio_pa_control
    type: gpio
    role: io
    config:
      pin: 46
      mode: GPIO_MODE_OUTPUT
      pull_up: true
      default_level: 1

  # LCD SPI Configuration for CO5300 QSPI
  - name: spi_display
    type: spi
    role: master
    config:
      # spi_bus_config_t fields
      spi_bus_config:
        spi_port: SPI2_HOST               # 0: SPI1_HOST, 1: SPI2_HOST, 2: SPI3_HOST
        data0_io_num: 4                  # MOSI_IO_NUM
        data1_io_num: 5                  # MISO_IO_NUM
        data2_io_num: 6                  # QUADWP_IO_NUM
        data3_io_num: 7                  # QUADHD_IO_NUM
        sclk_io_num: 38                   # SPI Clock signal
        max_transfer_sz: 9600             # Maximum transfer size in bytes : width * 2 * 10

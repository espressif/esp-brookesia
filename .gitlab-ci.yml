stages:
  - pre_check
  - build
  - target_test
  - deploy
  - post_deploy

workflow:
  rules:
    # Disable those non-protected push triggered pipelines
    - if: '$CI_COMMIT_REF_NAME != "master" && $CI_COMMIT_BRANCH !~ /^release\/v/ && $CI_COMMIT_TAG !~ /^v\d+\.\d+(\.\d+)?($|-)/ && $CI_PIPELINE_SOURCE == "push"'
      when: never
    # when running merged result pipelines, it would create a temp commit id. use $CI_MERGE_REQUEST_SOURCE_BRANCH_SHA instead of $CI_COMMIT_SHA.
    # Please use PIPELINE_COMMIT_SHA at all places that require a commit sha
    - if: $CI_OPEN_MERGE_REQUESTS != null
      variables:
        PIPELINE_COMMIT_SHA: $CI_MERGE_REQUEST_SOURCE_BRANCH_SHA
    - if: $CI_OPEN_MERGE_REQUESTS == null
      variables:
        PIPELINE_COMMIT_SHA: $CI_COMMIT_SHA
    - when: always

variables:
  COMPONENT_PATH: "$CI_PROJECT_DIR"

include:
  - '.gitlab/ci/pre/check.yml'
  - '.gitlab/ci/rules/patterns.yml'
  - '.gitlab/ci/rules/docs.yml'
  - '.gitlab/ci/rules/test_apps.yml'
  - '.gitlab/ci/rules/examples.yml'
  - '.gitlab/ci/builds/docs.yml'
  - '.gitlab/ci/builds/project_common.yml'
  - '.gitlab/ci/builds/project_test_apps.yml'
  - '.gitlab/ci/builds/project_examples.yml'
  - '.gitlab/ci/target_test/common.yml'
  - '.gitlab/ci/target_test/test_apps.yml'
  - '.gitlab/ci/target_test/examples.yml'
  - '.gitlab/ci/deploy/docs.yml'
  - '.gitlab/ci/deploy/github.yml'

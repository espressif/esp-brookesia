version: "0.7.3"
description: ESP-Brookesia Xiaozhi Agent which provides Xiaozhi API integration
url: https://github.com/espressif/esp-brookesia/tree/master/agent/brookesia_agent_xiaozhi
repository: https://github.com/espressif/esp-brookesia.git
issues: https://github.com/espressif/esp-brookesia/issues
dependencies:
  espressif/esp_websocket_client:
    version: "1.*"
    require: private

  espressif/brookesia_mcp_utils:
    version: "0.7.*"
    override_path: "../../utils/brookesia_mcp_utils"
    require: public

  espressif/brookesia_agent_manager:
    version: "0.7.*"
    override_path: "../brookesia_agent_manager"
    require: public

examples:
  - path: ../../examples/service/console
  - path: ../../examples/agent/chatbot

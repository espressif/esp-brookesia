variables:
  DOCKER_TARGET_TEST_v5_5_ENV_IMAGE: "${CI_DOCKER_REGISTRY}/target-test-env-v5.5:2"

.target_test_template:
  image: ${DOCKER_TARGET_TEST_v5_5_ENV_IMAGE}
  stage: target_test
  timeout: 4 hour
  cache:
    # Usually do not need submodule-cache in target_test
    - key: pip-cache
      paths:
        - .cache/pip
      policy: pull
  artifacts:
    when: always
    paths:
      - XUNIT_RESULT.xml
      - pytest_embedded_log/
    reports:
      junit: XUNIT_RESULT.xml
    expire_in: 4 days
  variables:
    GIT_DEPTH: 1
    SUBMODULES_TO_FETCH: "none"
    TEST_TARGET: 'esp32s3'
    TEST_FOLDER: '.'
    TEST_ENV: 'generic'
  script:
    - pip install -r .gitlab/requirements/requirement.pytest.txt
    - pytest ${TEST_FOLDER} --target ${TEST_TARGET} --env ${TEST_ENV} --junitxml=XUNIT_RESULT.xml

.target_test_idf_target_version_general_matrix:
  - IDF_TARGET: esp32s3
    IDF_VERSION: "5.5"
    ENV_TAG: "generic"
  - IDF_TARGET: esp32p4
    IDF_VERSION: "5.5"
    ENV_TAG: "generic,eco4"

.target_test_idf_target_version_general_with_psram_matrix:
  - IDF_TARGET: esp32s3
    IDF_VERSION: "5.5"
    ENV_TAG: "generic"
  - IDF_TARGET: esp32s3
    IDF_VERSION: "5.5"
    ENV_TAG: "generic,octal-psram"
  - IDF_TARGET: esp32p4
    IDF_VERSION: "5.5"
    ENV_TAG: "generic,eco4"

.target_test_idf_target_version_with_wifi_matrix:
  - IDF_TARGET: esp32s3
    IDF_VERSION: "5.5"
    ENV_TAG: "generic"
  - IDF_TARGET: esp32s3
    IDF_VERSION: "5.5"
    ENV_TAG: "generic,octal-psram"
  - IDF_TARGET: esp32p4
    IDF_VERSION: "5.5"
    ENV_TAG: "generic,eco4,esp32p4_function_ev_board"

.target_test_idf_target_version_with_board_matrix:
  - IDF_TARGET: esp32s3
    IDF_VERSION: "5.5"
    ENV_TAG: "esp_vocat"
  - IDF_TARGET: esp32p4
    IDF_VERSION: "5.5"
    ENV_TAG: "generic,eco4,esp32p4_function_ev_board"

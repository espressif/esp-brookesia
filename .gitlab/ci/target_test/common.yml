variables:
  DOCKER_TARGET_TEST_v6_0_ENV_IMAGE: "${CI_DOCKER_REGISTRY}/target-test-env-v6.0:2"

.target_test_template:
  image: ${DOCKER_TARGET_TEST_v6_0_ENV_IMAGE}
  stage: target_test
  timeout: 4 hour
  cache:
    # Usually do not need submodule-cache in target_test
    - key: pip-cache
      paths:
        - .cache/pip
      policy: pull
  artifacts:
    when: always
    paths:
      - XUNIT_RESULT.xml
      - pytest_embedded_log/
    reports:
      junit: XUNIT_RESULT.xml
    expire_in: 4 days
  variables:
    GIT_DEPTH: 1
    SUBMODULES_TO_FETCH: "none"
    TEST_TARGET: 'esp32s3'
    TEST_FOLDER: '.'
    TEST_ENV: 'generic'
  allow_failure: true
  script:
    - pip install -r .gitlab/requirements/requirement.pytest.txt
    - pytest ${TEST_FOLDER} --target ${TEST_TARGET} --env ${TEST_ENV} --junitxml=XUNIT_RESULT.xml

# Keep matrix values literal. GitLab shows raw variable names in matrix job names instead of expanded values.
.target_test_idf_target_version_general_psram_default_matrix:
  - IDF_TARGET: esp32s3
    IDF_VERSION: "6.0"
    ENV_TAG: "generic,octal-psram"
  - IDF_TARGET: esp32p4
    IDF_VERSION: "6.0"
    ENV_TAG: "jtag,esp32p4_rev3"

.target_test_idf_target_version_with_wifi_psram_default_matrix:
  - IDF_TARGET: esp32s3
    IDF_VERSION: "6.0"
    ENV_TAG: "generic,octal-psram"
  - IDF_TARGET: esp32p4
    IDF_VERSION: "6.0"
    ENV_TAG: "esp32p4x_function_ev_board"

.target_test_idf_target_version_with_board_matrix:
  - IDF_TARGET: esp32s3
    IDF_VERSION: "6.0"
    ENV_TAG: "esp_vocat"
  - IDF_TARGET: esp32p4
    IDF_VERSION: "6.0"
    ENV_TAG: "esp32p4x_function_ev_board"

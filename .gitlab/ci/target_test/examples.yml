#
# Examples
#
# agent/chatbot
target_test_examples_agent_chatbot:
  extends:
    - .target_test_template
    - .rules:build:examples_agent_chatbot
  needs:
    - job: "build_examples_agent_chatbot"
      artifacts: true
      optional: true
  parallel:
    # Keep matrix values literal. GitLab shows raw variable names in matrix job names instead of expanded values.
    matrix:
      - IDF_TARGET: esp32s3
        IDF_VERSION: "6.0"
        ENV_TAG: "esp_vocat"
      - IDF_TARGET: esp32p4
        IDF_VERSION: "6.0"
        ENV_TAG: "esp32p4x_function_ev_board"
  tags:
    - ${IDF_TARGET}
    - ${ENV_TAG}
  variables:
    TEST_TARGET: ${IDF_TARGET}
    TEST_FOLDER: examples/agent/chatbot
    TEST_ENV: ${ENV_TAG}

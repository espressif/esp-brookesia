#
# Docs
#
.rules:build:docs:
  rules:
    - !reference [.patterns-if-protected]
    - !reference [.patterns-if-label-build_docs]
    - !reference [.patterns-if-trigger-job]
    - if: !reference [.patterns-if-dev-push, if]
      changes: !reference [.patterns-build_system]
    - if: !reference [.patterns-if-dev-push, if]
      changes: !reference [.patterns-docs_rst]
    - if: !reference [.patterns-if-dev-push, if]
      changes: !reference [.patterns-docs_inc_1]
    - if: !reference [.patterns-if-dev-push, if]
      changes: !reference [.patterns-docs_inc_2]

.rules:deploy:docs_preview:
  rules:
    - !reference [.patterns-if-label-build_docs]
    - !reference [.patterns-if-trigger-job]
    - if: !reference [.patterns-if-dev-push, if]
      changes: !reference [.patterns-build_system]
    - if: !reference [.patterns-if-dev-push, if]
      changes: !reference [.patterns-docs_rst]
    - if: !reference [.patterns-if-dev-push, if]
      changes: !reference [.patterns-docs_inc_1]
    - if: !reference [.patterns-if-dev-push, if]
      changes: !reference [.patterns-docs_inc_2]

.rules:deploy:docs_production:
  rules:
    - !reference [.patterns-if-protected]

.rules:pre_check:readme:
  rules:
    - !reference [.patterns-if-protected]
    - !reference [.patterns-if-label-pre_check]
    - !reference [.patterns-if-trigger-job]
    - if: !reference [.patterns-if-dev-push, if]
      changes: !reference [.patterns-docs_md]
    - if: !reference [.patterns-if-dev-push, if]
      changes: !reference [.patterns-build_system]

version: "0.8.1"
description: ESP-Brookesia C++ settings app for the system-core app contract.
url: https://github.com/espressif/esp-brookesia/tree/master/app/brookesia_app_settings
repository: https://github.com/espressif/esp-brookesia.git
issues: https://github.com/espressif/esp-brookesia/issues
dependencies:
  espressif/brookesia_system_core:
    version: "0.8.*"
    override_path: ../../system/brookesia_system_core
    require: public

  espressif/brookesia_service_device:
    version: "0.8.*"
    override_path: ../../service/system/brookesia_service_device
    require: public

  espressif/brookesia_service_storage:
    version: "0.8.*"
    override_path: ../../service/system/brookesia_service_storage
    require: public

  espressif/brookesia_service_wifi:
    version: "0.8.*"
    override_path: ../../service/network/brookesia_service_wifi
    require: public

  espressif/brookesia_service_sntp:
    version: "0.8.*"
    override_path: ../../service/network/brookesia_service_sntp
    require: public

  espressif/brookesia_hal_interface:
    version: "0.8.*"
    override_path: ../../hal/brookesia_hal_interface
    require: public

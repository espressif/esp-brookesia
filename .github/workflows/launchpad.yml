# This workflow build examples, store the artifacts and deploy them to github pages.
# Generates the launchpad configuration file that can be used with the url.

name: "Build binaries and deploy to GitHub Pages"

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# One in-progress run per ref (PR or branch); never let a PR cancel a master deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Detect which examples need rebuilding based on changed paths.
  # On pull_request, builds are gated by these outputs.
  # On workflow_dispatch / push, all builds run regardless.
  changes:
    name: "Detect changed paths"
    runs-on: ubuntu-latest
    outputs:
      agent-chatbot: ${{ steps.filter.outputs.agent-chatbot }}
      service-console: ${{ steps.filter.outputs.service-console }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            agent-chatbot:
              - 'examples/agent/chatbot/**'
              - 'hal/**'
              - 'service/**'
              - 'expression/**'
              - 'utils/**'
              - 'plugin/**'
              - '.github/tools/build_with_board_manager.sh'
              - '.github/tools/generate_launchpad_*.sh'
              - '.github/workflows/launchpad.yml'
            service-console:
              - 'examples/service/console/**'
              - 'hal/**'
              - 'service/**'
              - 'expression/**'
              - 'utils/**'
              - 'plugin/**'
              - '.github/tools/build_with_board_manager.sh'
              - '.github/tools/generate_launchpad_*.sh'
              - '.github/workflows/launchpad.yml'

  build-examples-agent-chatbot:
    name: "Build Agent Chatbot"
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.agent-chatbot == 'true'
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        board:
          #
          # Espressif boards
          #
          - espressif/esp_vocat_board_v1_0
          - espressif/esp_vocat_board_v1_2
          - espressif/esp_box_3
          - espressif/esp32_p4_function_ev
          - espressif/esp32_s3_korvo2_v3
          # - espressif/esp_sensair_shuttle # TODO: ESP32-C5 chip is not supported by Launchpad yet
          #
          # RYMCU boards
          #
          - rymcu/rymcu_bigsmart
          #
          # Waveshare boards
          #
          - waveshare/esp32_s3_touch_amoled_1_8
          - waveshare/esp32_s3_touch_amoled_2_16
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'recursive'
      - run: mkdir -p images/agent/chatbot
      - name: Prepare board metadata
        shell: bash
        run: |
          BOARD_REF="${{ matrix.board }}"
          echo "BOARD_REF=$BOARD_REF" >> $GITHUB_ENV
          echo "BOARD_NAME=${BOARD_REF##*/}" >> $GITHUB_ENV
          echo "BOARD_ARTIFACT_NAME=${BOARD_REF//\//-}" >> $GITHUB_ENV
      - name: Get board chip type
        shell: bash
        run: |
          CHIP=$(grep "^chip:" "hal/brookesia_hal_boards/boards/$BOARD_REF/board_info.yaml" | awk '{print $2}')
          echo "CHIP=$CHIP" >> $GITHUB_ENV
          echo "Board chip: $CHIP"
      - name: Build agent/chatbot for ${{ matrix.board }}
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          $GITHUB_WORKSPACE/.github/tools/build_with_board_manager.sh \
            -p examples/agent/chatbot \
            -b "$BOARD_REF" \
            -c "$CHIP" \
            -o $GITHUB_WORKSPACE/images/agent/chatbot \

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-images-agent-chatbot-${{ env.BOARD_ARTIFACT_NAME }}
          path: images/agent/chatbot/
          overwrite: true

  build-examples-service-console:
    name: "Build Service Console"
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.service-console == 'true'
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        board:
          #
          # Espressif boards
          #
          - espressif/esp_vocat_board_v1_0
          - espressif/esp_vocat_board_v1_2
          - espressif/esp_box_3
          - espressif/esp32_p4_function_ev
          - espressif/esp32_s3_korvo2_v3
          # - espressif/esp_sensair_shuttle # TODO: ESP32-C5 chip is not supported by Launchpad yet
          #
          # RYMCU boards
          #
          - rymcu/rymcu_bigsmart
          #
          # Waveshare boards
          #
          - waveshare/esp32_s3_touch_amoled_1_8
          - waveshare/esp32_s3_touch_amoled_2_16
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'recursive'
      - run: mkdir -p images/service/console
      - name: Prepare board metadata
        shell: bash
        run: |
          BOARD_REF="${{ matrix.board }}"
          echo "BOARD_REF=$BOARD_REF" >> $GITHUB_ENV
          echo "BOARD_NAME=${BOARD_REF##*/}" >> $GITHUB_ENV
          echo "BOARD_ARTIFACT_NAME=${BOARD_REF//\//-}" >> $GITHUB_ENV
      - name: Get board chip type
        shell: bash
        run: |
          CHIP=$(grep "^chip:" "hal/brookesia_hal_boards/boards/$BOARD_REF/board_info.yaml" | awk '{print $2}')
          echo "CHIP=$CHIP" >> $GITHUB_ENV
          echo "Board chip: $CHIP"
      - name: Build service/console for ${{ matrix.board }}
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          $GITHUB_WORKSPACE/.github/tools/build_with_board_manager.sh \
            -p examples/service/console \
            -b "$BOARD_REF" \
            -c "$CHIP" \
            -o $GITHUB_WORKSPACE/images/service/console \

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-images-service-console-${{ env.BOARD_ARTIFACT_NAME }}
          path: images/service/console/
          overwrite: true

  deploy:
    needs: [build-examples-agent-chatbot, build-examples-service-console]
    # Only deploy on master pushes (or manual dispatch); skip for pull requests.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Restore previous images from cache branch
        run: |
          git fetch origin gh-pages-cache 2>/dev/null || true
          if git show-ref --verify refs/remotes/origin/gh-pages-cache >/dev/null 2>&1; then
            git checkout origin/gh-pages-cache -- images 2>/dev/null || true
            echo "Restored previous images:"
            find images -type f | sort
          else
            echo "No previous images cache found, starting fresh"
          fi
          mkdir -p images/agent/chatbot
          mkdir -p images/service/console

      - name: Download agent/chatbot builds
        uses: actions/download-artifact@v4
        with:
          pattern: build-images-agent-chatbot-*
          path: images/agent/chatbot/
          merge-multiple: true

      - name: Download service/console builds
        uses: actions/download-artifact@v4
        with:
          pattern: build-images-service-console-*
          path: images/service/console/
          merge-multiple: true

      - name: Generate launchpad configs
        run: |
          # Generate agent/chatbot launchpad
          cd $GITHUB_WORKSPACE/images/agent/chatbot/
          ls -la
          $GITHUB_WORKSPACE/.github/tools/generate_launchpad_config.sh $GITHUB_REPOSITORY agent/chatbot
          # Generate service/console launchpad
          cd $GITHUB_WORKSPACE/images/service/console/
          ls -la
          $GITHUB_WORKSPACE/.github/tools/generate_launchpad_config.sh $GITHUB_REPOSITORY service/console

      - name: Generate index page
        run: |
          $GITHUB_WORKSPACE/.github/tools/generate_launchpad_index.sh $GITHUB_REPOSITORY $GITHUB_WORKSPACE/images

      - name: Save images to cache branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git show-ref --verify refs/remotes/origin/gh-pages-cache >/dev/null 2>&1; then
            git worktree add /tmp/pages-cache origin/gh-pages-cache
          else
            git worktree add --detach /tmp/pages-cache
            (cd /tmp/pages-cache && git checkout --orphan gh-pages-cache && git rm -rf . 2>/dev/null || true)
          fi

          mkdir -p /tmp/pages-cache/images
          rsync -a --delete images/ /tmp/pages-cache/images/

          (
            cd /tmp/pages-cache
            git add -A
            if git diff --staged --quiet; then
              echo "No changes to images cache"
            else
              git commit -m "chore: sync images cache [run #${{ github.run_number }}]"
              git push origin HEAD:gh-pages-cache
            fi
          )

      - name: Setup Pages
        uses: actions/configure-pages@v2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: images/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# This workflow build examples, store the artifacts and deploy them to github pages.
# Generates the launchpad configuration file that can be used with the url.

name: "Build binaries and deploy to GitHub Pages"

on:
  workflow_dispatch:
  push:
    branches:
      - master

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-speaker:
    name: "Build Speaker"
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'recursive'
      - run: mkdir -p images/speaker
      - name: Get product version
        shell: bash
        run: |
          PRODUCT_VERSION=$(.github/tools/get_example_version.sh products/speaker)
          echo "PRODUCT_VERSION=$PRODUCT_VERSION" >> $GITHUB_ENV
          echo "Product version: $PRODUCT_VERSION"
      - name: Get boards name
        shell: bash
        run: |
          BOARDS_NAME=$(.github/tools/get_boards_name.sh products/speaker)
          echo "BOARDS_NAME=$BOARDS_NAME" >> $GITHUB_ENV
          echo "All boards name: $BOARDS_NAME"
      - name: Build product
        shell: bash
        run: |
          cd products/speaker
          . ${IDF_PATH}/export.sh
          for board in $BOARDS_NAME; do
            idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.ci.board.${board}" set-target esp32s3 && idf.py build
            pushd build
            esptool.py --chip esp32s3 merge_bin -o "$GITHUB_WORKSPACE/images/speaker/speaker_${PRODUCT_VERSION}_${board}.bin" @flash_args
            popd
            rm -rf sdkconfig build managed_components dependencies.lock
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-images-speaker
          path: images/speaker/
          overwrite: true

  deploy:
    needs: [build-speaker]

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Restore previous images from cache branch
        run: |
          git fetch origin gh-pages-cache 2>/dev/null || true
          if git show-ref --verify refs/remotes/origin/gh-pages-cache >/dev/null 2>&1; then
            git checkout origin/gh-pages-cache -- images 2>/dev/null || true
            echo "Restored previous images:"
            find images -type f | sort
          else
            echo "No previous images cache found, starting fresh"
          fi
          mkdir -p images/speaker

      - name: Download speaker builds
        uses: actions/download-artifact@v4
        with:
          name: build-images-speaker
          path: images/speaker/

      - name: Generate launchpad configs
        run: |
          # Generate speaker launchpad
          cd $GITHUB_WORKSPACE/images/speaker/
          ls -la
          $GITHUB_WORKSPACE/.github/tools/generate_launchpad_config.sh $GITHUB_REPOSITORY speaker

      - name: Generate index page
        run: |
          $GITHUB_WORKSPACE/.github/tools/generate_launchpad_index.sh $GITHUB_REPOSITORY $GITHUB_WORKSPACE/images

      - name: Save images to cache branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git show-ref --verify refs/remotes/origin/gh-pages-cache >/dev/null 2>&1; then
            git worktree add /tmp/pages-cache origin/gh-pages-cache
          else
            git worktree add --detach /tmp/pages-cache
            (cd /tmp/pages-cache && git checkout --orphan gh-pages-cache && git rm -rf . 2>/dev/null || true)
          fi

          mkdir -p /tmp/pages-cache/images
          rsync -a --delete images/ /tmp/pages-cache/images/

          (
            cd /tmp/pages-cache
            git add -A
            if git diff --staged --quiet; then
              echo "No changes to images cache"
            else
              git commit -m "chore: sync images cache [run #${{ github.run_number }}]"
              git push origin HEAD:gh-pages-cache
            fi
          )

      - name: Setup Pages
        uses: actions/configure-pages@v2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: images/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
